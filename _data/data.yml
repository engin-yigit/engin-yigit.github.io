projects:
  title: Projekte (Portfolio)
  intro: >
    Technische Portfolio-Projekte im Bereich Netzanalyse mit Python und pandapower.
  assignments:
  - title: "Netzstudie Niederspannung: Auswirkungen von EV-Ladeleistungen"
    link: "https://github.com/engin-yigit/P1_EV_Impact_Analysis"
    tagline: "Szenariobasierte Lastflussanalyse eines Niederspannungsnetzes zur Bewertung von Transformator- und Leitungsauslastung sowie Spannungsprofil unter verschiedenen EV-Szenarien. Kritische EV-Penetration durch Mitigationstest von ca. 12% auf ca. 18% verschoben."

  - title: "Netzstudie Mittelspannung: PV-Hosting-Capacity"
    link: "https://github.com/engin-yigit/P2_PV_Hosting_Capacity"
    tagline: "Szenariobasierte Lastflussanalyse eines Mittelspannungsnetzes zur Bewertung der PV-Hosting-Capacity. Technische Grenze bei ca. 10,3 MW zusätzlicher PV-Leistung, durch Mitigation auf ca. 14,7 MW brutto verschoben."

